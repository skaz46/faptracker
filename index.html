<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fap Tracker</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">

<link rel="stylesheet" href="style.css">


</head>
<body>


<div class="container">
    <h1>Fap Tracker</h1>
    
<div class="week-box">
    <p>This Week</p>

    <div class="week-days">
        <div class="day-column">
            <span>M</span>
            <div class="day-box" id="day0"></div>
        </div>

        <div class="day-column">
            <span>T</span>
            <div class="day-box" id="day1"></div>
        </div>

        <div class="day-column">
            <span>W</span>
            <div class="day-box" id="day2"></div>
        </div>

        <div class="day-column">
            <span>T</span>
            <div class="day-box" id="day3"></div>
        </div>

        <div class="day-column">
            <span>F</span>
            <div class="day-box" id="day4"></div>
        </div>

        <div class="day-column">
            <span>S</span>
            <div class="day-box" id="day5"></div>
        </div>

        <div class="day-column">
            <span>S</span>
            <div class="day-box" id="day6"></div>
        </div>
        
    </div>
</div>
    
    <div class="streak-box">
        <p>Current Streak</p>
        <h2 id="streak">0 Days</h2>
    </div>

    <div class="date-box">
        <p>Started On</p>
        <h3 id="startDate">Not Set</h3>
    </div>
    <button id="relapseBtn">
        Gooned 🥀
    </button>
    <button id="startBtn">Start Journey</button>
    <button id="resetBtn">Reset Streak</button>
</div>

<script src="script.js"></script>


</body>
</html>
