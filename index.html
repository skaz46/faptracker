<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fap Tracker</title>


<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">


</head>
<body>


<div class="container">
    <h1>🔥 Fap Tracker</h1>

    <div class="streak-box">
        <p>Current Streak</p>
        <h2 id="streak">0 Days</h2>
    </div>

    <div class="date-box">
        <p>Started On</p>
        <h3 id="startDate">Not Set</h3>
    </div>

    <button id="startBtn">Start Journey</button>
    <button id="resetBtn">Reset Streak</button>
</div>

<script src="script.js"></script>


</body>
</html>
